{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "dmf-cms.fullname" . }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- $ingressPath := "/" -}}
  {{- if eq .Values.ingress.exposureMode "path" -}}
  {{- $ingressPath = "/console" -}}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: {{ $ingressPath }}
            pathType: {{ .Values.ingress.pathType }}
            backend:
              service:
                name: {{ include "dmf-cms.fullname" . }}
                port:
                  number: {{ .Values.service.port }}
{{- end }}
