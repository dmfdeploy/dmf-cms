name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      PYTHONPYCACHEPREFIX: /tmp/dmf-cms-pycache
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Set up Helm
        uses: azure/setup-helm@fe7b79cd5ee1e45176fcad797de68ecaf3ca4814  # v4.2.0

      - name: Install package and dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Compile sources
        run: python -m compileall src tests

      - name: Check installed dependencies
        run: python -m pip check

      - name: Render Helm chart
        run: |
          helm template dmf-cms charts/dmf-cms \
            --set image.repository=dmf-cms \
            --set image.tag=0.1.0 \
            --set env.secretKeySecret.existingSecretName=dmf-cms-runtime \
            --set oidc.clientSecret.existingSecretName=dmf-cms-runtime \
            --set oidc.issuerUrl=https://auth.example.invalid \
            --set oidc.clientId=dmf-cms

          helm template dmf-cms charts/dmf-cms \
            --set image.repository=dmf-cms \
            --set image.tag=0.1.0 \
            --set ingress.exposureMode=path \
            --set env.secretKeySecret.existingSecretName=dmf-cms-runtime \
            --set oidc.clientSecret.existingSecretName=dmf-cms-runtime \
            --set oidc.issuerUrl=https://auth.example.invalid \
            --set oidc.clientId=dmf-cms

      - name: Run tests
        run: pytest -q -o cache_dir=/tmp/dmf-cms-pytest-cache

  working-model:
    # Working-model block sync (umbrella issue dmfdeploy/dmfdeploy#32): the
    # agent-context block in CLAUDE.md/AGENTS.md/QWEN.md must stay byte-identical
    # to the umbrella template; --strict fails on a missing or drifted block.
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2 — umbrella: canonical template + checker
        with:
          repository: dmfdeploy/dmfdeploy
          path: .umbrella
          persist-credentials: false
      - name: Working-model block sync (strict)
        run: .umbrella/bin/check-working-model-sync.sh --repo . --strict --template .umbrella/docs/templates/working-model-block.md
